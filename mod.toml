[meta]
name = "empire-upkeep"
version = "0.1.0"
description = "Empire maintenance fee system — per-room upkeep, controller repair, and recycle refund for Swarm"
author = "Swarm Team"

[dependencies]

[config]
base_upkeep = { type = "u32", default = 50, description = "Base upkeep cost per room per tick" }
room_soft_cap = { type = "u32", default = 10, description = "Soft cap on room count before quadratic scaling" }
controller_passive_income = { type = "u32", default = 40, description = "Passive resource income generated by owned controllers" }
controller_passive_income_rcl_bonus = { type = "u32", default = 5, description = "Additional passive income per controller level" }
resource = { type = "string", default = "Energy", description = "Resource used for upkeep and passive controller income" }
repair_cap = { type = "basis_points", default = 3500, description = "Maximum repair percentage in basis points (3500 = 35%)" }
distance_decay_bp = { type = "basis_points", default = 500, description = "Repair efficiency decay per tile in basis points (500 = 5%/tile)" }
recycle_refund_base = { type = "basis_points", default = 5000, description = "Base refund ratio in basis points (5000 = 50%)" }
recycle_refund_min = { type = "basis_points", default = 1000, description = "Minimum refund floor in basis points (1000 = 10%)" }
tutorial_recycle_refund_full_ticks = { type = "u64", default = 500, description = "Tutorial ticks during which recycling refunds full body cost" }

[compatibility]
engine_abi_min = "1.0"
